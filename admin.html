<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Thompson Lawn & Snow</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #0b4a28;
      --green-dark: #083820;
      --green-light: #0f5c32;
      --gold: #c9a84c;
      --gold-light: #dbbe7a;
      --gold-muted: #a8894a;
      --white: #ffffff;
      --off-white: #f5f0e8;
      --text-light: #e8dfc8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--off-white);
      color: #222;
      min-height: 100vh;
    }

    /* ─── LOGIN SCREEN ─── */
    #login-screen {
      min-height: 100vh;
      background: var(--green-dark);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.25);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .login-sub {
      font-size: 0.6rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-muted);
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .login-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-light);
      font-weight: 600;
      display: block;
      text-align: left;
      margin-bottom: 0.4rem;
    }

    .login-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(201,168,76,0.3);
      background: rgba(255,255,255,0.06);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.88rem;
      color: var(--white);
      outline: none;
      margin-bottom: 1.2rem;
      transition: border-color 0.2s;
    }

    .login-input:focus {
      border-color: var(--gold);
    }

    .login-btn {
      width: 100%;
      background: var(--gold);
      color: var(--green-dark);
      padding: 13px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover { background: var(--gold-light); }

    .login-error {
      font-size: 0.75rem;
      color: #e06060;
      margin-top: 0.8rem;
      display: none;
    }

    /* ─── ADMIN DASHBOARD ─── */
    #dashboard { display: none; }

    header {
      background: var(--green-dark);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 0 5%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-logo span {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.5rem;
      letter-spacing: 3px;
      color: var(--gold-muted);
      font-weight: 300;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .admin-badge {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-muted);
      font-weight: 600;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.35);
      color: var(--gold-muted);
      padding: 7px 18px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .dashboard-body {
      padding: 3rem 5%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .dashboard-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--green-dark);
      margin-bottom: 0.3rem;
    }

    .dashboard-subtitle {
      font-size: 0.72rem;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 2.5rem;
    }

    /* ─── STATS ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: var(--green-dark);
      padding: 1.5rem;
      text-align: center;
    }

    .stat-card-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      display: block;
    }

    .stat-card-label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-light);
      font-weight: 300;
      margin-top: 0.3rem;
    }

    /* ─── FILTERS ─── */
    .filters-row {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 8px 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid var(--green-dark);
      background: transparent;
      color: var(--green-dark);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--green-dark);
      color: var(--gold);
    }

    .filter-search {
      margin-left: auto;
      padding: 8px 14px;
      border: 1px solid #ccc;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }

    .filter-search:focus { border-color: var(--green); }

    /* ─── REQUESTS TABLE ─── */
    .requests-section {
      background: white;
      border: 1px solid #e0dbd0;
    }

    .requests-section-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .requests-section-title {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green-dark);
      font-weight: 700;
    }

    .requests-count {
      font-size: 0.68rem;
      color: #aaa;
      letter-spacing: 1px;
    }

    .request-card {
      padding: 1.4rem 1.5rem;
      border-bottom: 1px solid #f0ece4;
      transition: background 0.15s;
      cursor: pointer;
    }

    .request-card:last-child { border-bottom: none; }
    .request-card:hover { background: #faf8f4; }

    .request-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .request-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--green-dark);
    }

    .request-meta {
      font-size: 0.72rem;
      color: #888;
      margin-top: 0.15rem;
    }

    .request-right {
      text-align: right;
      flex-shrink: 0;
    }

    .request-date {
      font-size: 0.68rem;
      color: #aaa;
      letter-spacing: 1px;
    }

    .status-badge {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      margin-top: 0.4rem;
    }

    .status-new { background: #e8f4ec; color: #1a6b3a; }
    .status-contacted { background: #fff8e6; color: #a07000; }
    .status-booked { background: #e6f0ff; color: #2255a0; }
    .status-closed { background: #f0f0f0; color: #888; }

    .request-service {
      font-size: 0.75rem;
      color: #555;
      margin-top: 0.3rem;
    }

    .request-message {
      font-size: 0.78rem;
      color: #777;
      font-weight: 300;
      line-height: 1.6;
      margin-top: 0.4rem;
      max-width: 600px;
    }

    .no-results {
      padding: 3rem;
      text-align: center;
      color: #bbb;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      .filter-search { width: 100%; margin-left: 0; }
      .request-card-top { flex-direction: column; }
      .request-right { text-align: left; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Thompson</div>
      <div class="login-sub">Admin Panel</div>
      <label class="login-label">Password</label>
      <input class="login-input" type="password" id="pw-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') doLogin()" />
      <button class="login-btn" onclick="doLogin()">Sign In</button>
      <div class="login-error" id="login-error">Incorrect password. Try again.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header>
      <div class="header-logo">
        Thompson
        <span>Lawn &amp; Snow — Admin</span>
      </div>
      <div class="header-right">
        <span class="admin-badge">Admin</span>
        <button class="logout-btn" onclick="doLogout()">Log Out</button>
      </div>
    </header>

    <div class="dashboard-body">
      <div class="dashboard-title">Quote Requests</div>
      <div class="dashboard-subtitle" id="dashboard-date"></div>

      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-card-num" id="stat-total">0</span>
          <span class="stat-card-label">Total Requests</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-num" id="stat-new">0</span>
          <span class="stat-card-label">New</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-num" id="stat-contacted">0</span>
          <span class="stat-card-label">Contacted</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-num" id="stat-booked">0</span>
          <span class="stat-card-label">Booked</span>
        </div>
      </div>

      <div class="filters-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('new', this)">New</button>
        <button class="filter-btn" onclick="setFilter('contacted', this)">Contacted</button>
        <button class="filter-btn" onclick="setFilter('booked', this)">Booked</button>
        <button class="filter-btn" onclick="setFilter('closed', this)">Closed</button>
        <input class="filter-search" type="text" placeholder="Search name or service..." id="search-input" oninput="renderRequests()" />
      </div>

      <div class="requests-section">
        <div class="requests-section-header">
          <span class="requests-section-title">Requests</span>
          <span class="requests-count" id="requests-count"></span>
        </div>
        <div id="requests-list"></div>
      </div>
    </div>
  </div>

  <script>
    // ─── PASSWORD ───
    // Change this to whatever password you want
    const ADMIN_PASSWORD = 'thompson2024';

    function doLogin() {
      const val = document.getElementById('pw-input').value;
      if (val === ADMIN_PASSWORD) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        initDashboard();
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }

    function doLogout() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('pw-input').value = '';
      document.getElementById('login-error').style.display = 'none';
    }

    // ─── SAMPLE DATA (replace with real submissions later) ───
    const requests = [
      {
        id: 1,
        name: 'Sarah Mitchell',
        email: 'sarah.mitchell@gmail.com',
        phone: '(403) 555-0187',
        service: 'Lawn Care - Medium Yard',
        frequency: 'Biweekly',
        message: 'Hi, looking for someone reliable to mow our backyard every two weeks. We have a medium-sized lot in Panorama Hills.',
        date: '2024-06-10',
        status: 'new'
      },
      {
        id: 2,
        name: 'Dave Kowalski',
        email: 'd.kowalski@outlook.com',
        phone: '(403) 555-0234',
        service: 'Snow Removal - Large',
        frequency: 'Monthly Plan',
        message: 'Need full seasonal snow removal for a long double driveway and front walk. Based in Tuscany.',
        date: '2024-06-08',
        status: 'contacted'
      },
      {
        id: 3,
        name: 'Linda Park',
        email: 'lindapark82@gmail.com',
        phone: '',
        service: 'Lawn Care - Small Yard',
        frequency: 'One-Time Visit',
        message: "Just need a one-time mow before a family gathering next weekend. Yard hasn't been done in a while.",
        date: '2024-06-07',
        status: 'booked'
      },
      {
        id: 4,
        name: 'James Okafor',
        email: 'jokafor@hotmail.com',
        phone: '(403) 555-0099',
        service: 'Seasonal Cleanup',
        frequency: 'One-Time Visit',
        message: 'Spring cleanup needed — lots of leaves and debris from winter. Would like a quote.',
        date: '2024-06-05',
        status: 'closed'
      },
    ];

    let currentFilter = 'all';

    function initDashboard() {
      const now = new Date();
      document.getElementById('dashboard-date').textContent =
        now.toLocaleDateString('en-CA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      updateStats();
      renderRequests();
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = requests.length;
      document.getElementById('stat-new').textContent = requests.filter(r => r.status === 'new').length;
      document.getElementById('stat-contacted').textContent = requests.filter(r => r.status === 'contacted').length;
      document.getElementById('stat-booked').textContent = requests.filter(r => r.status === 'booked').length;
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRequests();
    }

    function renderRequests() {
      const search = document.getElementById('search-input').value.toLowerCase();
      let filtered = requests.filter(r => {
        const matchFilter = currentFilter === 'all' || r.status === currentFilter;
        const matchSearch = !search ||
          r.name.toLowerCase().includes(search) ||
          r.service.toLowerCase().includes(search) ||
          r.email.toLowerCase().includes(search);
        return matchFilter && matchSearch;
      });

      document.getElementById('requests-count').textContent = filtered.length + ' request' + (filtered.length !== 1 ? 's' : '');

      const list = document.getElementById('requests-list');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="no-results">No requests found.</div>';
        return;
      }

      list.innerHTML = filtered.map(r => `
        <div class="request-card">
          <div class="request-card-top">
            <div>
              <div class="request-name">${r.name}</div>
              <div class="request-meta">${r.email}${r.phone ? ' &nbsp;·&nbsp; ' + r.phone : ''}</div>
            </div>
            <div class="request-right">
              <div class="request-date">${formatDate(r.date)}</div>
              <div><span class="status-badge status-${r.status}">${r.status}</span></div>
            </div>
          </div>
          <div class="request-service">${r.service} &nbsp;·&nbsp; ${r.frequency}</div>
          ${r.message ? `<div class="request-message">"${r.message}"</div>` : ''}
        </div>
      `).join('');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
    }
  </script>

</body>
</html>
